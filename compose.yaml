services:
  mma-g2-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mmag2
      POSTGRES_PASSWORD: mmag234!
      POSTGRES_DB: db_mmag2
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

